<!DOCTYPE html>
<html>
<head>
<title>Snake Ultimate</title>

<style>

body{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 10s ease infinite;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

canvas{
background:#111;
border:4px solid white;
margin-top:20px;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
border-radius:8px;
background:#00c3ff;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:#00ffa6;
}

.level{
padding:6px;
margin:4px;
}

.completed{
color:lime;
font-weight:bold;
}

#snakeTitle{
font-size:60px;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px)}
to{transform:translateY(-10px)}
}

</style>

</head>

<body>

<div id="menu">

<h1 id="snakeTitle">🐍 Snake Ultimate</h1>

<h2 id="bestScore">Meilleur score : 0</h2>

<button onclick="startClassic()">Mode Classique</button>
<button onclick="openAdventure()">Mode aventure</button>

</div>

<div id="adventureMenu" style="display:none">

<h1>Mode aventure</h1>

<div id="levels"></div>

<button onclick="backToMenu()">Retour</button>

</div>

<div id="game" style="display:none">

<h2 id="score">Score : 0</h2>
<p id="objective"></p>

<canvas id="canvas" width="400" height="400"></canvas>

</div>

<div id="gameover" style="display:none">

<h1>💀 Game Over</h1>

<button onclick="restartLevel()">Rejouer</button>
<button onclick="backToMenu()">Retour au lobby</button>

</div>

<div id="win" style="display:none">

<h1>🏆 Niveau terminé</h1>

<button onclick="nextLevel()">Niveau suivant</button>
<button onclick="backToMenu()">Retour au lobby</button>

</div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let snake
let food
let dx
let dy
let score
let interval

let mode="classic"

let level=1
let levelGoal=10

let snakeColor="lime"

let colors=[
"lime","cyan","orange","yellow","pink",
"purple","red","blue","gold","white"
]

let bestScore=localStorage.getItem("snakeBest")||0
document.getElementById("bestScore").innerText="Meilleur score : "+bestScore

function startClassic(){

mode="classic"
startGame()

}

function openAdventure(){

document.getElementById("menu").style.display="none"
document.getElementById("adventureMenu").style.display="block"

updateAdventureUI()

}

function updateAdventureUI(){

let container=document.getElementById("levels")
container.innerHTML=""

for(let i=1;i<=10;i++){

let div=document.createElement("div")

div.className="level"

let goal=i*10

if(localStorage.getItem("level"+i)){
div.classList.add("completed")
}

div.innerText="Niveau "+i+" - Score requis : "+goal

div.onclick=()=>startAdventure(i)

container.appendChild(div)

}

}

function startAdventure(lvl){

mode="adventure"

level=lvl
levelGoal=lvl*10

snakeColor=colors[lvl-1]

startGame()

}

function startGame(){

document.getElementById("menu").style.display="none"
document.getElementById("adventureMenu").style.display="none"
document.getElementById("gameover").style.display="none"
document.getElementById("win").style.display="none"

document.getElementById("game").style.display="block"

snake=[{x:200,y:200}]
food=randomFood()

dx=20
dy=0
score=0

document.getElementById("score").innerText="Score : 0"

if(mode=="adventure"){
document.getElementById("objective").innerText=
"Niveau "+level+" | Objectif : "+levelGoal
}else{
document.getElementById("objective").innerText=""
}

interval=setInterval(loop,100)

}

function randomFood(){

return{
x:Math.floor(Math.random()*20)*20,
y:Math.floor(Math.random()*20)*20
}

}

document.addEventListener("keydown",direction)

function direction(e){

if(e.key==="ArrowUp" && dy==0){dx=0;dy=-20}
if(e.key==="ArrowDown" && dy==0){dx=0;dy=20}
if(e.key==="ArrowLeft" && dx==0){dx=-20;dy=0}
if(e.key==="ArrowRight" && dx==0){dx=20;dy=0}

}

function loop(){

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
}

if(head.x<0||head.y<0||head.x>=400||head.y>=400){
gameOver()
return
}

for(let part of snake){

if(head.x==part.x && head.y==part.y){
gameOver()
return
}

}

snake.unshift(head)

if(head.x==food.x && head.y==food.y){

score++

document.getElementById("score").innerText="Score : "+score

food=randomFood()

if(score>bestScore){

bestScore=score
localStorage.setItem("snakeBest",bestScore)

document.getElementById("bestScore").innerText="Meilleur score : "+bestScore

}

if(mode=="classic"){

snakeColor=colors[Math.floor(score/10)%colors.length]

}

if(mode=="adventure" && score>=levelGoal){

winLevel()
return

}

}else{

snake.pop()

}

ctx.fillStyle="#111"
ctx.fillRect(0,0,400,400)

ctx.fillStyle="red"
ctx.fillRect(food.x,food.y,20,20)

snake.forEach((p,i)=>{

ctx.fillStyle=snakeColor
ctx.fillRect(p.x,p.y,20,20)

if(i==0){

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(p.x+6,p.y+6,3,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(p.x+14,p.y+6,3,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="black"
ctx.beginPath()
ctx.moveTo(p.x+6,p.y+14)
ctx.lineTo(p.x+14,p.y+14)
ctx.stroke()

}

})

}

function gameOver(){

clearInterval(interval)

document.getElementById("game").style.display="none"
document.getElementById("gameover").style.display="block"

}

function winLevel(){

clearInterval(interval)

localStorage.setItem("level"+level,true)

document.getElementById("game").style.display="none"
document.getElementById("win").style.display="block"

}

function nextLevel(){

level++

if(level>10){
backToMenu()
return
}

startAdventure(level)

}

function restartLevel(){

document.getElementById("gameover").style.display="none"

if(mode=="adventure"){
startAdventure(level)
}else{
startClassic()
}

}

function backToMenu(){

document.getElementById("game").style.display="none"
document.getElementById("gameover").style.display="none"
document.getElementById("win").style.display="none"
document.getElementById("adventureMenu").style.display="none"

document.getElementById("menu").style.display="block"

updateAdventureUI()

}

</script>

</body>
</html>
